name: CICD

on: 
 workflow_dispatch: 

jobs:
  code:
   runs-on: ubuntu-slim
   steps:
     - name: clone the code
       run: echo "Cloning the code"       
  build:
   needs: [code]
   runs-on: ubuntu-slim
   steps:
     - name: Build the docker
       run: echo "Building using docker"  
  test:
   needs: [build]
   runs-on: ubuntu-slim
   steps:
     - name: Runing test cases
       run: echo " Testing the app" 
  deploy:
    needs: [build,test]
    runs-on: ubuntu-slim
    steps:
      - name: deploying on machine
        run: echo "Deploying the app"
